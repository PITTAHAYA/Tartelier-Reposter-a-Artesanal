<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tartelier</title>
    <script>
      const pathSegmentsToKeep = 1;
      const locationData = window.location;
      const basePath = locationData.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');
      const routePath = locationData.pathname
        .slice(1)
        .split('/')
        .slice(pathSegmentsToKeep)
        .join('/')
        .replace(/&/g, '~and~');

      locationData.replace(
        `${locationData.protocol}//${locationData.hostname}${locationData.port ? `:${locationData.port}` : ''}${basePath}/?/${routePath}${locationData.search ? `&${locationData.search.slice(1).replace(/&/g, '~and~')}` : ''}${locationData.hash}`
      );
    </script>
  </head>
  <body></body>
</html>
